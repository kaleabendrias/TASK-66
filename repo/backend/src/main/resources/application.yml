spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/demodb}
    username: ${SPRING_DATASOURCE_USERNAME:demouser}
    password: ${SPRING_DATASOURCE_PASSWORD:demopass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: 3600000
  encryption:
    secret: ${APP_ENCRYPTION_SECRET}
  rate-limit:
    requests-per-minute: 60
    login-attempts-per-hour: 10
    login-lockout-minutes: 15
  reservation:
    hold-minutes: 30
    low-stock-threshold: 5
  incident:
    ack-sla-minutes: 15
    resolve-sla-hours: 24
  account-deletion:
    cooling-off-days: 30
  audit:
    retention-years: 2
