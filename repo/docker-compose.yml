services:
  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_DB: demodb
      POSTGRES_USER: demouser
      POSTGRES_PASSWORD: demopass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demouser -d demodb"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: demo-backend
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/demodb
      SPRING_DATASOURCE_USERNAME: demouser
      SPRING_DATASOURCE_PASSWORD: demopass
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SERVER_PORT: "8080"
      APP_JWT_SECRET: "${APP_JWT_SECRET:?Set APP_JWT_SECRET before starting}"
      APP_ENCRYPTION_SECRET: "${APP_ENCRYPTION_SECRET:?Set APP_ENCRYPTION_SECRET before starting}"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://localhost:8443/api
    container_name: demo-frontend
    expose:
      - "3000"
    depends_on:
      - backend

  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: demo-proxy
    ports:
      - "8443:8443"
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
