spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/demodb}
    username: ${SPRING_DATASOURCE_USERNAME:demouser}
    password: ${SPRING_DATASOURCE_PASSWORD:demopass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${APP_JWT_SECRET:f47ac10b58cc4372a5670e02b2c3d479e0b6d2a1c8f34567890abcdef1234567}
    expiration-ms: 3600000
  encryption:
    secret: ${APP_ENCRYPTION_SECRET:d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4}
  rate-limit:
    requests-per-minute: 60
    login-attempts-per-hour: 10
    login-lockout-minutes: 15
  reservation:
    hold-minutes: 30
    low-stock-threshold: 5
  incident:
    ack-sla-minutes: 15
    resolve-sla-hours: 24
  account-deletion:
    cooling-off-days: 30
  audit:
    retention-years: 2
