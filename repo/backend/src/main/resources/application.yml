spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/demodb}
    username: ${SPRING_DATASOURCE_USERNAME:demouser}
    password: ${SPRING_DATASOURCE_PASSWORD:demopass}
  jpa:
    hibernate:
      # Flyway is the source of truth for the production schema. Hibernate's
      # strict schema-validate refuses to start when an entity field's
      # generated default type (e.g. VARCHAR) doesn't match the actual
      # PostgreSQL column type (e.g. jsonb / text[]) — even though the
      # @JdbcTypeCode mapping handles the conversion at runtime. Disabling
      # validation here lets Flyway own the DDL contract end-to-end.
      ddl-auto: none
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  # Default to the HTTPS listener so there is no plaintext upstream hop
  # between the nginx proxy and the Spring Boot container. The keystore
  # is baked into the image in the backend Dockerfile.
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:true}
    key-store: ${SERVER_SSL_KEY_STORE:/app/certs/backend.p12}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:changeit}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:backend}
    protocol: TLS

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: 3600000
  encryption:
    secret: ${APP_ENCRYPTION_SECRET}
  rate-limit:
    requests-per-minute: 60
    login-attempts-per-hour: 10
    login-lockout-minutes: 15
  reservation:
    hold-minutes: 30
    low-stock-threshold: 5
  incident:
    ack-sla-minutes: 15
    resolve-sla-hours: 24
  account-deletion:
    cooling-off-days: 30
  audit:
    retention-years: 2
