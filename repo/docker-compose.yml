services:
  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_DB: demodb
      POSTGRES_USER: demouser
      POSTGRES_PASSWORD: demopass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demouser -d demodb"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: demo-backend
    expose:
      - "8443"
    entrypoint: ["sh", "-c", "export APP_JWT_SECRET=$${APP_JWT_SECRET:-$$(cat /dev/urandom | tr -dc 'a-f0-9' | head -c 64)} && export APP_ENCRYPTION_SECRET=$${APP_ENCRYPTION_SECRET:-$$(cat /dev/urandom | tr -dc 'a-f0-9' | head -c 64)} && exec java -jar app.jar"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/demodb
      SPRING_DATASOURCE_USERNAME: demouser
      SPRING_DATASOURCE_PASSWORD: demopass
      # Flyway owns DDL; disable Hibernate strict schema validation so jsonb /
      # text[] columns don't trip Hibernate's column-type comparison.
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_SHOW_SQL: "false"
      # HTTPS listener — keystore baked into the image in backend/Dockerfile.
      # The proxy talks to this port over TLS (see proxy/nginx.conf).
      SERVER_PORT: "8443"
      SERVER_SSL_ENABLED: "true"
      SERVER_SSL_KEY_STORE: "/app/certs/backend.p12"
      SERVER_SSL_KEY_STORE_PASSWORD: "changeit"
      SERVER_SSL_KEY_STORE_TYPE: "PKCS12"
      SERVER_SSL_KEY_ALIAS: "backend"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://localhost:8443/api
    container_name: demo-frontend
    expose:
      - "3443"
    depends_on:
      - backend

  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: demo-proxy
    ports:
      - "8443:8443"
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
