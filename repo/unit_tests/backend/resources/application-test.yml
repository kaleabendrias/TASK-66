spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

server:
  port: 0
  ssl:
    enabled: false

app:
  jwt:
    secret: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
    expiration-ms: 3600000
  encryption:
    secret: c9f2e8d1a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1f0a9b8c7d6e5f4a3b2c1d0
  rate-limit:
    requests-per-minute: 60
    login-attempts-per-hour: 10
    login-lockout-minutes: 15
  reservation:
    hold-minutes: 30
    low-stock-threshold: 5
  incident:
    ack-sla-minutes: 15
    resolve-sla-hours: 24
  account-deletion:
    cooling-off-days: 30
  audit:
    retention-years: 2
